name: prime_foto_studio
description: Sistem informasi pemesanan dan manajemen layanan Prime Foto Studio

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.2
  google_fonts: ^4.0.3
  flutter_svg: ^2.0.7
  cached_network_image: ^3.2.3
  image_picker: ^1.0.4
  carousel_slider: ^4.2.1

  # State Management
  provider: ^6.0.5
  flutter_bloc: ^8.1.3

  # Navigation
  go_router: ^12.1.1

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.2

  # Local Storage
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0

  # Date & Time
  intl: ^0.18.1
  table_calendar: ^3.0.9

  # Utils
  uuid: ^4.1.0
  url_launcher: ^6.1.12

  # Notifications
  flutter_local_notifications: ^16.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/portfolio/

